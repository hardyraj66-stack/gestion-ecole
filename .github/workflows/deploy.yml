name: Deploy — Oracle Cloud

# Déploiement automatique à chaque merge/push sur main.
# Se connecte en SSH à la VM Oracle, récupère le code et reconstruit les conteneurs.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # permet aussi un déclenchement manuel depuis l'onglet Actions

concurrency:
  group: deploy-production
  cancel-in-progress: false # ne jamais interrompre un déploiement en cours

jobs:
  deploy:
    name: Build & déploiement sur la VM
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          # Le build sur 1 Go de RAM peut être long : laisser large.
          command_timeout: 30m
          script: |
            set -e
            cd ~/ekolova
            git fetch origin main
            # Force la branche locale main à correspondre exactement à origin/main
            # (idempotent quelle que soit la branche courante de la VM).
            git checkout -B main origin/main
            docker compose up -d --build
            docker image prune -f
            echo "=== Conteneurs ==="
            docker compose ps
